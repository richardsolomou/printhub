services:
  printhub:
    image: ghcr.io/richardsolomou/printhub:latest
    build:
      context: .
    restart: unless-stopped
    ports:
      - '3010:3000'
    volumes:
      # App data: SQLite database, settings, in-flight uploads.
      - ${DATA_HOST_DIR:-./printhub-data}:/data
      # Your print files: todo/, in-progress/, done/ live here as plain files.
      - ${PRINTS_HOST_DIR:-./prints}:/prints
